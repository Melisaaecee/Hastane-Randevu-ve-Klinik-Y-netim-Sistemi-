# Veritabanı Bağlantısı - Railway Değişkenlerini Kullanır
# Eski hali: spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}...
# Yeni hali:
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/hospital_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Ayarları
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Sunucu Portu (Railway otomatik atar)
server.port=${PORT:8080}

# JWT Ayarları
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# E-posta Ayarları (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JSON & Log Ayarları
spring.jackson.serialization.fail-on-empty-beans=false
logging.level.org.hibernate.SQL=ERROR