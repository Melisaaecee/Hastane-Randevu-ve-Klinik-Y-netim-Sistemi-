<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Giriş | Sağlık Sistemi</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="center-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Giriş<span>Yap</span></h1>
    
            </div>

            <div id="errorBox" class="error-box" style="display: none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label>TC KİMLİK NO</label>
                    <input type="text" id="tckn" placeholder="11 haneli TC numaranız" maxlength="11" required>
                </div>

                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Sisteme Giriş Yap</button>
            </form>

            <div class="auth-footer">
                Yeni misiniz? <a href="register.html">Hesap Oluştur</a>
            </div>
        </div>
    </div>

    <script src="javascript/index.js"></script>
</body>

</html>
