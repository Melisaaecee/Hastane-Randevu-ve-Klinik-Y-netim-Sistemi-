<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Giriş | Sağlık Sistemi</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Mevcut sekme stillerin korunuyor */
        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }

        /* "Şifremi Unuttum" Linki ve Modal İçin Eklemeler (CSS Bozmaz) */
        .auth-options {
            display: flex;
            justify-content: flex-end;
            margin: -10px 0 15px 0;
        }

        .forgot-link {
            font-size: 0.85rem;
            color: #64748b;
            text-decoration: none;
            cursor: pointer;
        }

        .forgot-link:hover { color: #2563eb; }

        .modal-overlay {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .close-modal {
            position: absolute;
            right: 20px; top: 15px;
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="center-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Sistem<span>Girişi</span></h1>
            </div>

            <div class="auth-tabs">
                <button type="button" class="tab-btn active" id="btnPatient" onclick="window.switchTab('PATIENT')">Hasta Girişi</button>
                <button type="button" class="tab-btn" id="btnStaff" onclick="window.switchTab('STAFF')">Personel Girişi</button>
            </div>

            <div id="errorBox" class="error-box" style="display: none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label id="identityLabel">TC KİMLİK NO</label>
                    <input type="text" id="tckn" placeholder="11 haneli TC numaranız" required>
                </div>

                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="auth-options">
                    <span class="forgot-link" onclick="window.openForgotModal()">Şifremi Unuttum?</span>
                </div>

                <button type="submit" class="btn-primary">Giriş Yap</button>
            </form>

            <div class="auth-footer">
                Henüz kayıtlı değil misiniz? <a href="register.html">Hesap Oluştur</a>
            </div>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="window.closeForgotModal()">&times;</span>
            <h2 style="margin-bottom: 10px;">Şifre <span>Sıfırla</span></h2>
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">E-posta adresinize bir sıfırlama linki göndereceğiz.</p>
            
            <div class="input-group">
                <label>E-POSTA</label>
                <input type="email" id="forgotEmail" placeholder="mail@ornek.com">
            </div>
            
            <button class="btn-primary" onclick="window.sendResetLink()" id="btnReset">Link Gönder</button>
            <p id="forgotMsg" style="margin-top:15px; font-size:0.85rem; display:none;"></p>
        </div>
    </div>

    <script src="javascript/index.js"></script>
    <script>
        // Tüm fonksiyonları window'a bağladık
        window.switchTab = function(role) {
            const label = document.getElementById('identityLabel');
            const input = document.getElementById('tckn');
            const btnPatient = document.getElementById('btnPatient');
            const btnStaff = document.getElementById('btnStaff');

            if (role === 'STAFF') {
                label.innerText = "KULLANICI ADI";
                input.placeholder = "Doktor veya Admin kullanıcı adı";
                input.removeAttribute('maxlength');
                btnStaff.classList.add('active');
                btnPatient.classList.remove('active');
            } else {
                label.innerText = "TC KİMLİK NO";
                input.placeholder = "11 haneli TC numaranız";
                input.setAttribute('maxlength', '11');
                btnPatient.classList.add('active');
                btnStaff.classList.remove('active');
            }
        };

        window.openForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'flex';
        };

        window.closeForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'none';
            document.getElementById('forgotMsg').style.display = 'none';
        };

        window.sendResetLink = async function() {
            const email = document.getElementById('forgotEmail').value;
            const msg = document.getElementById('forgotMsg');
            const btn = document.getElementById('btnReset');

            if (!email || !email.includes('@')) {
                alert("Geçerli bir email girin.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Gönderiliyor...";

            try {
                // Senin yazdığın ForgotPasswordRequest'e gidiyor
                const response = await fetch('http://localhost:8080/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if (response.ok) {
                    msg.style.color = "green";
                    msg.innerText = "Sıfırlama linki gönderildi!";
                } else {
                    msg.style.color = "red";
                    msg.innerText = "Hata oluştu, tekrar deneyin.";
                }
                msg.style.display = 'block';
            } catch (err) {
                alert("Sunucu hatası!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Link Gönder";
            }
        };
    </script>
</body>
</html>
