<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol | Sağlık Sistemi</title>
    <link rel="icon" href="https://api.iconify.design/fa6-solid:heart-pulse.svg?color=%23e11d48" type="image/svg+xml">
    <style>
        /* Değişkenler ve Body ayarı Login ile aynı (flex-center dahil) */
        :root {
            --primary-blue: #007bff;
            --light-blue: #e3f2fd;
            --dark-blue: #1e3a8a;
            --bg-pattern: #f0f4f8;
        }

        body {
            background-color: var(--bg-pattern);
            background-image:
                linear-gradient(var(--light-blue) 1.5px, transparent 1.5px),
                linear-gradient(90deg, var(--light-blue) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            padding: 40px 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 580px;
            /* Register için biraz daha geniş */
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Paylaştığın Form Row Grid Yapısı */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-blue);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: var(--primary-blue);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        /* Responsive ayarı: Mobilde yan yana duranlar alt alta gelsin */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>
    <div class="center-wrapper">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <h1>Yeni<span>Hesap</span></h1>
                <p>Lütfen bilgilerinizi eksiksiz doldurunuz.</p>
            </div>

            <div id="errorBox" class="error-box" style="display: none; color: red; margin-bottom: 10px;"></div>

            <form id="registerForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>AD</label>
                        <input type="text" id="firstName" placeholder="Adınız" required>
                    </div>
                    <div class="input-group">
                        <label>SOYAD</label>
                        <input type="text" id="lastName" placeholder="Soyadınız" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>TC KİMLİK NO</label>
                    <input type="text" id="tckn" maxlength="11" placeholder="11 haneli TCKN" required>
                </div>

                <div class="input-group">
                    <label>E-POSTA</label>
                    <input type="email" id="email" placeholder="ornek@mail.com" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>DOĞUM TARİHİ</label>
                        <input type="date" id="birthDate" required>
                    </div>
                    <div class="input-group">
                        <label>KAN GRUBU</label>
                        <select id="bloodType" required>
                            <option value="">Seçiniz</option>
                            <option value="A_POSITIVE">A Rh+</option>
                            <option value="A_NEGATIVE">A Rh-</option>
                            <option value="B_POSITIVE">B Rh+</option>
                            <option value="B_NEGATIVE">B Rh-</option>
                            <option value="AB_POSITIVE">AB Rh+</option>
                            <option value="AB_NEGATIVE">AB Rh-</option>
                            <option value="O_POSITIVE">0 Rh+</option>
                            <option value="O_NEGATIVE">0 Rh-</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="password" placeholder="En az 8 karakter" required>
                </div>

                <button type="submit" class="btn-primary">Kaydı Tamamla</button>
            </form>

            <div class="auth-footer">
                Zaten hesabınız var mı? <a href="index.html">Giriş Yap</a>
            </div>
        </div>
    </div>

    <script src="javascript/register.js"></script>
</body>

</html>
