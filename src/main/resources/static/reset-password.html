<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Yeni Şifre Belirle</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Genel Arka Plan ve Hizalama */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
        }

        /* Şifre Sıfırlama Kartı (Glassmorphism) */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        /* Başlık Stili */
        .login-container h2 {
            color: #1e293b;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Form ve Input Düzeni */
        #resetPasswordForm {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 14px;
            box-sizing: border-box;
            /* Taşmaları önler */
            transition: 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Buton Stili (Dashboard ile uyumlu) */
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }

        /* Bilgi Mesajı Alt Kısmı */
        #message {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        /* Senin Dashboard'undaki Animasyon */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Yeni Şifre Oluştur</h2>
        <form id="resetPasswordForm">
            <input type="password" id="newPassword" placeholder="Yeni Şifre" required>
            <input type="password" id="confirmPassword" placeholder="Şifre Tekrar" required>
            <button type="submit" class="btn-primary">Şifreyi Güncelle</button>
        </form>
        <p id="message"></p>
    </div>
    <script src="javascript/reset.js"></script>
</body>

</html>
