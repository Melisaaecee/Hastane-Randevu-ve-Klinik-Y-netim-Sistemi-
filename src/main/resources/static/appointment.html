<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevu Al | Sağlık Sistemi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-center">
        <div class="selection-card">
            <div class="auth-header">
                <h2>Randevu <span>Al</span></h2>
                <p class="subtitle">Lütfen poliklinik ve doktor seçimi yapınız.</p>
            </div>

            <div id="errorBox" class="error-box" style="display: none;"></div>

            <form id="appointmentForm">
                <div class="input-group">
                    <label>Poliklinik Seçin</label>
                    <select id="clinicSelect" required>
                        <option value="" disabled selected>Poliklinik seçiniz...</option>
                        <option value="Kardiyoloji">Kardiyoloji</option>
                        <option value="Dahiliye">Dahiliye</option>
                        <option value="Göz Hastalıkları">Göz Hastalıkları</option>
                        <option value="Nöroloji">Nöroloji</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Doktor Seçin</label>
                    <select id="doctorSelect" required disabled>
                        <option value="" disabled selected>Önce poliklinik seçiniz...</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Randevu Tarihi</label>
                    <input type="date" id="appointmentDate" required>
                </div>

                <div class="info-note">
                    <span>ℹ️</span>
                    <span>Hafta sonları randevu verilmemektedir.</span>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="location.href='patient.html'" class="btn-danger" style="flex: 1;">İptal</button>
                    <button type="submit" class="btn-primary" style="flex: 2;">Randevuyu Onayla</button>
                </div>
            </form>
        </div>
    </div>

    <script src="javascript/appointment.js"></script>
</body>
</html>
